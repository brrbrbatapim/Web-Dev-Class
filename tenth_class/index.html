<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background-color:#e6e6e6;
}

.outer-box {
  width:500px;
  height:400px;
  background-color:#3498db;
  display:flex;
  justify-content:center;
  align-items:center;
}

.inner-box {
  width:400px;
  height:250px;
  background-color:#ffffff;
  display:flex;
  justify-content:center;
  align-items:center;
}

video {
  width:100%;
  height:100%;
}
</style>
</head>
<body>

<div class="outer-box">
  <div class="inner-box">
    <video controls>
      <source src="video.mp4" type="video/mp4">
      Your browser does not support video.
    </video>
  </div>
</div>

</body>
</html>
